name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "playground/**"
      - "src/**"
      - ".github/workflows/playground.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish playground
        run: dotnet publish playground/Geohash.Playground.csproj -c Release -o publish

      - name: Rewrite base href for project pages
        run: sed -i 's|<base href="/" />|<base href="/geohash-dotnet/" />|' publish/wwwroot/index.html

      - name: SPA + Jekyll plumbing
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          touch publish/wwwroot/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
